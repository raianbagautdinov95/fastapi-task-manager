services:
  db:
    image: postgres:16
    container_name: task_manager_db
    environment:
      POSTGRES_DB: task_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: task_manager_app
    depends_on:
      - db
    ports:
      - "8001:8000"
    env_file:
      - .env
    volumes:
      - .:/code

volumes:
  postgres_data: